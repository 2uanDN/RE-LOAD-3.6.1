<div class="h-full flex flex-col justify-between">
  <div>
    <div class="flex items-center justify-between gap-2 mb-3">
      <span class="text-[10px] uppercase font-semibold text-[var(--text-secondary)] tracking-wider flex items-center gap-1.5">
        <i data-lucide="clock" class="w-3.5 h-3.5 text-[var(--accent)]"></i>
        {{TIME_TEXT}}
      </span>
    </div>
    <h2 class="font-bold font-prose text-lg mb-4 text-[var(--text-primary)] line-clamp-2 leading-tight group-hover/card:text-[var(--accent)] transition-colors">{{TITLE}}</h2>
    <div class="space-y-2 border-t border-subtle pt-3">
      <p class="text-sm text-[var(--text-secondary)] flex items-center justify-between">
        <span>Character:</span>
        <span class="text-[var(--text-primary)] font-semibold text-right max-w-[150px] truncate" title="{{CHARACTER_NAME_RAW}}">{{CHARACTER_NAME}}</span>
      </p>
      <p class="text-sm text-[var(--text-secondary)] flex items-center justify-between">
        <span>Turns:</span>
        <span class="bg-[var(--bg-elevated)] px-2.5 py-0.5 rounded font-mono text-xs text-[var(--text-primary)] border border-[var(--border-default)] shadow-sm">{{TURN_COUNT}}</span>
      </p>
    </div>
  </div>
  <div class="mt-6 flex gap-2.5 items-center w-full">
    <button class="continue-btn bg-[var(--accent)] text-[#1d1607] hover:bg-[var(--accent-dim)] px-4 py-2.5 rounded-lg text-sm font-bold transition-all duration-300 flex-1 shadow-sm hover:shadow-md flex items-center justify-center gap-1.5 focus:outline-none focus:ring-1 focus:ring-[var(--accent)] border border-transparent">
      <i data-lucide="play" class="w-4 h-4 fill-current"></i>
      Continue
    </button>
    <button class="delete-btn text-[var(--text-muted)] hover:text-[var(--error)] p-2.5 rounded-lg hover:bg-[var(--bg-hover)] transition-all duration-200" title="Delete">
      <i data-lucide="trash-2" class="w-5 h-5"></i>
    </button>
  </div>
</div>
