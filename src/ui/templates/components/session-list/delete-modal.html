<div class="flex justify-center mb-4">
  <div class="w-12 h-12 rounded-full border-2 border-[var(--error)] flex items-center justify-center text-[var(--error)]">
    <i data-lucide="alert-triangle" class="w-6 h-6"></i>
  </div>
</div>
<h3 class="text-xl font-bold text-[var(--text-primary)] mb-2 mix-blend-normal">Delete Adventure?</h3>
<p class="text-[var(--text-secondary)] mb-6 text-sm leading-relaxed">This action cannot be undone. All memories, turns, and milestones for this adventure will be permanently lost.</p>
<div class="flex gap-3 w-full">
  <button id="cancel-delete-btn" class="flex-1 px-4 py-2 bg-[var(--bg-elevated)] text-[var(--text-primary)] font-bold rounded-lg border border-[var(--border-default)] hover:bg-[var(--bg-hover)] transition-colors">Cancel</button>
  <button id="confirm-delete-btn" class="flex-1 px-4 py-2 bg-[var(--error)] text-white font-bold rounded-lg hover:opacity-90 transition-opacity">Delete</button>
</div>
