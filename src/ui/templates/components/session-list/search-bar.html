<div class="relative flex items-center bg-[var(--bg-surface)] border border-[var(--border-default)] rounded-xl px-4 py-3 shadow-sm focus-within:border-[var(--accent)] focus-within:ring-1 focus-within:ring-[var(--accent)] transition-all">
  <i data-lucide="search" class="w-5 h-5 text-[var(--text-secondary)] mr-3"></i>
  <input type="text" id="adventure-search" placeholder="Search adventures by title, main character, or prompts..." class="w-full bg-transparent text-[var(--text-primary)] focus:outline-none placeholder-[var(--text-muted)] text-sm">
  <button id="clear-search-btn" class="hidden text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors ml-2">
    <i data-lucide="x" class="w-4 h-4"></i>
  </button>
</div>
