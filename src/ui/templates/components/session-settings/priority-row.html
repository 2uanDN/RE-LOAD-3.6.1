<div class="flex items-center justify-between w-full gap-2">
  <input type="text" class="cp-title flex-1 p-2 rounded border border-[var(--border-default)] bg-[var(--bg-base)] text-[var(--text-primary)] focus:ring-2 focus:ring-[var(--border-focus)] outline-none font-bold text-sm" placeholder="Title" value="{{CP_TITLE}}">
  <button class="delete-cp text-[var(--text-muted)] hover:text-[var(--error)] transition-colors p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
</div>
<textarea class="cp-desc w-full p-2 rounded border border-[var(--border-default)] bg-[var(--bg-base)] text-[var(--text-primary)] focus:ring-2 focus:ring-[var(--border-focus)] outline-none resize-none min-h-[60px] text-sm" placeholder="Description/Instructions...">{{CP_DESC}}</textarea>
