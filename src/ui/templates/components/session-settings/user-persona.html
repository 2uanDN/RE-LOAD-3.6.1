<div class="flex flex-wrap justify-between items-center gap-3 mb-2">
  <p class="text-sm text-[var(--text-secondary)] mt-1">Updates will affect how characters perceive you.</p>
  <label class="cursor-pointer text-sm px-3 py-1.5 bg-[var(--accent-glow)] hover:bg-[var(--accent)] text-[var(--accent)] hover:text-white rounded font-medium flex items-center gap-1 transition-colors whitespace-nowrap shrink-0" title="Upload Character File (.txt, .md)">
    <i data-lucide="upload" class="w-4 h-4"></i> Upload file
    <input type="file" accept=".txt,.md" id="upload-protagonist-file-settings" class="hidden">
  </label>
</div>

<label class="font-bold text-[var(--text-primary)] mb-1 block">Character Codex (Persona/Background)</label>
<div class="relative group w-full flex flex-col min-h-[150px] mb-4">
   <textarea id="edit-persona" class="flex-1 w-full p-4 rounded-lg border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] focus:ring-2 focus:ring-[var(--border-focus)] focus:border-transparent outline-none resize-none font-mono text-sm leading-relaxed min-h-0">{{USER_PERSONA}}</textarea>
   <button type="button" class="btn-expand-persona absolute top-2 right-2 p-2 bg-[var(--bg-hover)] text-[var(--text-secondary)] rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Expand"><i data-lucide="maximize-2" class="w-4 h-4"></i></button>
</div>

<label class="font-bold text-[var(--text-primary)] mb-1 block">Physical Appearance</label>
<div class="relative group w-full flex flex-col min-h-[100px] mb-4">
   <textarea id="edit-appearance" class="flex-1 w-full p-4 rounded-lg border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] focus:ring-2 focus:ring-[var(--border-focus)] focus:border-transparent outline-none resize-none font-mono text-sm leading-relaxed min-h-0">{{USER_APPEARANCE}}</textarea>
   <button type="button" class="btn-expand-appearance absolute top-2 right-2 p-2 bg-[var(--bg-hover)] text-[var(--text-secondary)] rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Expand"><i data-lucide="maximize-2" class="w-4 h-4"></i></button>
</div>

<label class="font-bold text-[var(--text-primary)] mb-1 block">Relationship Dynamics</label>
<div class="relative group w-full flex flex-col min-h-[100px] mb-4">
   <textarea id="edit-relationship" class="flex-1 w-full p-4 rounded-lg border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] focus:ring-2 focus:ring-[var(--border-focus)] focus:border-transparent outline-none resize-none font-mono text-sm leading-relaxed min-h-0">{{USER_RELATIONSHIP}}</textarea>
   <button type="button" class="btn-expand-relationship absolute top-2 right-2 p-2 bg-[var(--bg-hover)] text-[var(--text-secondary)] rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Expand"><i data-lucide="maximize-2" class="w-4 h-4"></i></button>
</div>

<div class="flex justify-between items-center mb-2 mt-4">
  <label class="font-bold text-[var(--text-primary)]">Custom Fields</label>
  <button type="button" id="add-protagonist-cf-btn" class="text-sm px-2 py-1 bg-[var(--bg-hover)] text-[var(--text-primary)] rounded hover:text-[var(--accent)] transition-colors flex items-center gap-1"><i data-lucide="plus" class="w-4 h-4"></i> Add</button>
</div>
<div id="protagonist-cf-list" class="flex flex-col gap-2 mb-4"></div>

<div class="flex justify-end pt-4 shrink-0 border-t border-[var(--border-default)]">
  <button id="save-persona" class="bg-[var(--accent)] hover:opacity-90 text-[var(--bg-base)] px-6 py-2 rounded-lg font-medium shadow-sm transition-opacity flex items-center gap-2">
    <i data-lucide="save" class="w-4 h-4"></i> Save Protagonist Identity
  </button>
</div>
