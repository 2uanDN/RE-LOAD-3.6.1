<button class="choice-btn w-full p-[0.625rem_1rem] text-left bg-transparent border-b border-default last:border-0 hover:bg-hover hover:border-l-2 hover:border-l-[var(--accent)] transition-colors text-sm flex gap-3 items-start group disabled:opacity-40 disabled:pointer-events-none disabled:cursor-default" aria-label="{{ARIA_LABEL}}" data-choice-label="{{SAFE_LABEL}}" data-choice-desc="{{SAFE_DESC}}">
  {{NUMBER_HTML}}
  <div class="flex flex-col">
    <span class="font-bold accent group-hover:text-[var(--accent)]">{{SAFE_LABEL}}</span>
    {{DESC_HTML}}
  </div>
</button>
