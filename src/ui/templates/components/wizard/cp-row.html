<div class="flex items-center justify-between w-full gap-3">
  <input type="text" class="cp-title flex-1 p-2 rounded-lg border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] focus:ring-2 focus:ring-[var(--border-focus)] outline-none font-bold" placeholder="Title (e.g. Tone, Constraints)" value="{{TITLE}}">
  <button type="button" class="delete-cp text-[var(--text-muted)] hover:text-[var(--error)] transition-colors p-2 shrink-0 bg-[var(--bg-hover)] rounded-md"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
</div>
<div class="relative w-full group">
  <textarea class="cp-desc w-full p-3 rounded-lg border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] focus:ring-2 focus:ring-[var(--border-focus)] outline-none resize-none min-h-[100px] text-sm" placeholder="Specify instructions for this priority...">{{DESCRIPTION}}</textarea>
  <button type="button" class="expand-cp absolute top-2 right-2 text-[var(--text-muted)] hover:text-[var(--text-primary)] p-1 bg-[var(--bg-hover)] rounded opacity-0 sm:group-hover:opacity-100 transition-opacity" title="Expand Priority"><i data-lucide="maximize-2" class="w-4 h-4"></i></button>
</div>
