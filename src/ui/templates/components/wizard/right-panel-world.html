<div class="space-y-3">
  <div><label class="text-xs font-bold text-[var(--text-secondary)] uppercase">Genre</label><input type="text" id="ai-genre" placeholder="e.g. Cyberpunk, Fantasy" class="w-full mt-1 p-2 rounded border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] text-sm"></div>
  <div><label class="text-xs font-bold text-[var(--text-secondary)] uppercase">Setting/Era</label><input type="text" id="ai-era" placeholder="e.g. 2142 Neo-Tokyo" class="w-full mt-1 p-2 rounded border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] text-sm"></div>
  <div><label class="text-xs font-bold text-[var(--text-secondary)] uppercase">Mood</label><input type="text" id="ai-mood" placeholder="e.g. Grim, Hopeful" class="w-full mt-1 p-2 rounded border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] text-sm"></div>
  <div><label class="text-xs font-bold text-[var(--text-secondary)] uppercase">Key Themes</label><input type="text" id="ai-themes" placeholder="e.g. Corruption, Magic vs Tech" class="w-full mt-1 p-2 rounded border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] text-sm"></div>
</div>
