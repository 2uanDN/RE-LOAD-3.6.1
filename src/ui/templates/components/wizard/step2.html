<div class="p-6 border-b border-[var(--border-default)]">
  <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-[var(--accent)] to-[var(--accent-dim)] mb-1 font-prose">Who Are You?</h2>
  <p class="text-[var(--text-secondary)]">Define your character in this world.</p>
</div>
<div class="p-6 flex-1 flex flex-col gap-4">
  <div>
    <label class="block font-bold text-[var(--text-primary)] mb-2">Protagonist Name</label>
    <input type="text" id="val-char-name" class="w-full p-3 rounded-lg border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] focus:ring-2 focus:ring-[var(--border-focus)] outline-none" placeholder="Enter name...">
  </div>
  <div class="flex-1 flex flex-col">
    <div class="flex flex-wrap justify-between items-center gap-3 mb-2">
       <label class="font-bold text-[var(--text-primary)] mt-1">Character Codex (Persona/Background)</label>
       <div class="flex flex-wrap gap-2">
           <label class="cursor-pointer text-sm px-3 py-1.5 bg-[var(--accent-glow)] hover:bg-[var(--accent)] text-[var(--accent)] hover:text-white rounded font-medium flex items-center gap-1 transition-colors whitespace-nowrap shrink-0" title="Upload Character File (.txt, .md)">
             <i data-lucide="upload" class="w-4 h-4"></i> Upload file
             <input type="file" accept=".txt,.md" id="upload-protagonist-file" class="hidden">
           </label>
           <button id="assist-char" class="text-sm px-3 py-1.5 bg-[var(--accent-glow)] hover:bg-[var(--accent)] text-[var(--accent)] hover:text-white rounded font-medium flex items-center gap-1 transition-colors whitespace-nowrap shrink-0"><i data-lucide="sparkles" class="w-4 h-4"></i> Help me build this</button>
       </div>
    </div>
    <div class="relative flex-1 flex group min-h-[150px]">
      <textarea id="val-persona" class="w-full flex-1 p-4 rounded-lg border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] focus:ring-2 focus:ring-[var(--border-focus)] focus:border-transparent outline-none resize-none font-mono text-sm leading-relaxed" placeholder="Background, traits, abilities..."></textarea>
      <button type="button" id="expand-persona" class="absolute top-2 right-2 text-[var(--text-muted)] hover:text-[var(--text-primary)] p-1 bg-[var(--bg-hover)] rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Expand"><i data-lucide="maximize-2" class="w-4 h-4"></i></button>
    </div>
    <div class="flex justify-between items-center mb-2 mt-4">
       <label class="font-bold text-[var(--text-primary)]">Physical Appearance</label>
    </div>
    <div class="relative flex-1 flex group min-h-[100px]">
      <textarea id="val-appearance" class="w-full flex-1 p-4 rounded-lg border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] focus:ring-2 focus:ring-[var(--border-focus)] focus:border-transparent outline-none resize-none font-mono text-sm leading-relaxed" placeholder="Physical features, distinctive marks, clothing style..."></textarea>
      <button type="button" id="expand-appearance" class="absolute top-2 right-2 text-[var(--text-muted)] hover:text-[var(--text-primary)] p-1 bg-[var(--bg-hover)] rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Expand"><i data-lucide="maximize-2" class="w-4 h-4"></i></button>
    </div>

    <!-- Relationship Dynamics -->
    <div class="flex justify-between items-center mb-2 mt-4">
       <label class="font-bold text-[var(--text-primary)]">Relationship Dynamics</label>
    </div>
    <div class="relative flex-1 flex group min-h-[100px]">
      <textarea id="val-relationship" class="w-full flex-1 p-4 rounded-lg border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] focus:ring-2 focus:ring-[var(--border-focus)] focus:border-transparent outline-none resize-none font-mono text-sm leading-relaxed" placeholder="How characters perceive or interact with you..."></textarea>
      <button type="button" id="expand-relationship" class="absolute top-2 right-2 text-[var(--text-muted)] hover:text-[var(--text-primary)] p-1 bg-[var(--bg-hover)] rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Expand"><i data-lucide="maximize-2" class="w-4 h-4"></i></button>
    </div>

    <!-- Protagonist Custom Fields -->
    <div class="flex justify-between items-center mb-2 mt-4">
      <label class="font-bold text-[var(--text-primary)]">Custom Fields</label>
      <button id="add-protagonist-cf-btn" class="text-sm px-2 py-1 bg-[var(--bg-hover)] text-[var(--text-primary)] rounded hover:text-[var(--accent)] transition-colors flex items-center gap-1"><i data-lucide="plus" class="w-4 h-4"></i> Add</button>
    </div>
    <div id="protagonist-cf-list" class="flex flex-col gap-2"></div>

  </div>
</div>
