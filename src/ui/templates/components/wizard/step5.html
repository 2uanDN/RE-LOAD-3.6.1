<div class="p-6 border-b border-[var(--border-default)]">
  <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-[var(--accent)] to-[var(--accent-dim)] mb-1 font-prose">Finalize The Stage</h2>
  <p class="text-[var(--text-secondary)]">Establish the starting state of your adventure.</p>
</div>
<div class="p-6 flex-1 flex flex-col gap-6">
  <div class="flex-1 flex flex-col">
    <label class="block font-bold text-[var(--text-primary)] mb-1">The Catalyst / World Post-Arrival (Optional)</label>
    <p class="text-xs text-[var(--text-secondary)] mb-2">How does your character's existence immediately alter the world state? Leave blank to start normally.</p>
    <div class="relative flex-1 flex group min-h-[150px]">
      <textarea id="val-world-after" class="w-full flex-1 p-4 rounded-lg border border-[var(--border-default)] bg-[var(--bg-elevated)] text-[var(--text-primary)] focus:ring-2 focus:ring-[var(--border-focus)] focus:border-transparent outline-none resize-none font-mono text-sm leading-relaxed" placeholder="e.g. You are known as the hero who saved the city..."></textarea>
      <button type="button" id="expand-world-after" class="absolute top-2 right-2 text-[var(--text-muted)] hover:text-[var(--text-primary)] p-1 bg-[var(--bg-hover)] rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Expand"><i data-lucide="maximize-2" class="w-4 h-4"></i></button>
    </div>
  </div>
</div>
